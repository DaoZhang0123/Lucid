# Lucid 运行时配置
#
# 这个文件是「示例 / 默认模板」，会被打进发行包；安装后真实的用户配置在
#   ~/.lucid/config.toml（Windows: C:\Users\<name>\.lucid\config.toml）
# 里改它，不要改这个文件（会在升级时被覆盖）。
#
# 三个 LLM 后端任选其一，靠 [llm].provider 切换。

[llm]
# provider: anthropic | copilot
#   anthropic — 直接调 Anthropic 原生 Messages API，需要 ANTHROPIC_API_KEY
#   copilot   — 走 GitHub Copilot OAuth（设置页里登录），免费额度充足
provider = "copilot"

# 模型最长输出 token（Claude Opus 4.x 上限 32768；agent 场景中庸 16384 平衡延迟与不被截断）
max_tokens = 16384

# 是否启用 prompt caching（系统 prompt 与早期截图）
enable_prompt_cache = true

# 采样参数。留空 / 注释掉表示用各 provider 的服务端默认值（通常 temperature=0.2, top_p=1）
temperature = 0.2
top_p = 1.0

# 对话历史里最多额外保留多少张截图（L1/L2/L3 各保留最近 1 张为默认主要保留策略）。
# 超出后旧图会被替换成占位文本（带本地文件名/路径），防止上游 413 Request Entity Too Large。
# 设 0 表示只靠每级保留 1 张的规则（实际 ≤3 张）；>0 时额外保留全局最近 N 张。
keep_recent_screenshots = 0

# === provider = "anthropic" 时使用 ===
[llm.anthropic]
model = "claude-opus-4-6"
# 留空则从 ANTHROPIC_API_KEY 环境变量读
api_key = ""
base_url = "https://api.anthropic.com"
anthropic_version = "2023-06-01"

# === provider = "copilot" 时使用 ===
[llm.copilot]
model = "claude-opus-4.6"
# 留空走默认路径 ~/.lucid/copilot.json
state_file = ""

[logging]
# 是否把每次运行的主要信息与截图持久化到本地
enabled = true
# 日志根目录（相对路径会落到 ~/.lucid/logs）
dir = "logs"
# 文本日志等级：DEBUG | INFO | WARNING | ERROR | OFF
text_level = "INFO"
# 截图保存等级：DEBUG | INFO | WARNING | OFF
image_level = "INFO"
# 截图存储格式：png | jpg
image_format = "png"
# JPG 质量（仅 image_format=jpg 时生效）
jpg_quality = 85
# 历史轮转：最多保留多少次运行的目录；0 = 不轮转（永不自动删除）。
keep_runs = 0

[screenshot]
# 下采样长边；0 = 不缩放
l1_max_long_edge = 1568
l2_max_long_edge = 1568
l3_max_long_edge = 0

# 对话历史里每个 level 保留最近 K 张截图（装入发给 LLM 的 prompt 里）。
# 超出部分被替换为带路径的占位文本；模型需要回看时可调用 load_local_images(path=...) 重新加载。
keep_recent_l1 = 1
keep_recent_l2 = 1
# L3 (cursor_local) 保留最近 K 张；模型主动请求的细节图，留几张方便后续步骤回看
keep_recent_l3 = 1
# 每个不同的 active app 至少保留多少张最近的 L2（按 launch_app/focus_window 的 slug 区分）。
# 这样在 App-A → App-B → App-C 的串联任务里，App-A 那张关键 L2 不会被新 App 的 L2 一次性挤掉。
min_per_l2_app = 1

[safety]
# 全局急停热键（在 /settings 页面也可改）
emergency_hotkey = "ctrl+alt+esc"
# 保存/打开对话框中检测到"左侧导航树点击"时注入纠正提示（行为层兜底）。
save_dialog_sidebar_guard = true

[input]
# 输入策略：clipboard | unicode_sendinput
# - clipboard（推荐）：action="type" 走剪贴板粘贴，避开输入法状态干扰，中英文/路径都能直接传。
# - unicode_sendinput：走 pyautogui.typewrite，只支持 ASCII。
chinese_input = "clipboard"
# 每个动作之间的最小间隔（秒），给 UI 留响应时间
action_delay = 0.15
# 蟹钳鼠标：Lucid 跑任务期间把系统光标换成一只橙色蟹钳，提醒用户这是由 Lucid
# 操纵的。任务结束 / 取消 / sidecar 崩溃 / Ctrl+C 都会自动还原默认光标。
crab_cursor = true


[visual_notify]
# 任务栏视觉通知两步法：先截图 diff，有变化再调 LLM 确认是否有新消息。
enabled = true
# 每隔多少秒截一次任务栏（必须 >= 1）
poll_interval_sec = 2.0
# 检测区域：底部 strip_height_px 像素，中间 strip_center_width_ratio 比例宽度
strip_height_px = 120
# 是否自动使用系统任务栏实际高度（开启后会覆盖 strip_height_px）
auto_detect_taskbar_height = true
strip_center_width_ratio = 0.50
# Step 1 diff：dHash 汉明距离超过此阈值才触发 Step 2（越小越灵敏，建议 6-12）
diff_method = "dhash"
diff_threshold = 8.0
# Step 2 LLM 确认
llm_confirm_enabled = true
llm_confirm_on_diff_only = true
# LLM 确认冷却时间（秒），防止短时间内重复触发
llm_confirm_cooldown_sec = 5.0
# LLM 确认最大输出 token
llm_confirm_max_tokens = 300
# 是否保存监听截图；recent 目录只保留最近 N 张，key 目录保留触发时的关键截图
save_screenshots = true
recent_screenshot_keep = 100
key_screenshot_keep = 200
# 确认有新消息后，是否自动发起一轮任务查看并回复
auto_chat_enabled = true
auto_chat_instruction = "请打开对应的聊天工具查看最近未读，结合上下文给出简短自然的回复后返回继续监听。"


[doze]
# 打盹学习：sidecar 空闲时低优先级反思已结束的 thread，
# 抽取 learn_tip / remember 写回长期记忆。详见 Docs/doze.md。
# 默认关；在 /settings 显式开启。
enabled = true
idle_threshold_sec = 300
tick_interval_sec = 60
max_threads_per_pass = 1
max_rounds_per_thread = 2
max_tool_calls_per_pass = 6
max_event_text_chars = 600
max_tips_digest_lines = 30
max_memory_digest_lines = 30
max_tokens = 1500
prompt_version = 1


[voice]
# 语音输入（Push-to-Talk）。详见 Docs/voice-input.md。
# 默认关；用户在 /settings → Voice 显式开启。开启后首次按下快捷键
# 才会下载模型（首次 ~150MB，后续走 ~/.lucid/voice/models/ 缓存）。
enabled = false

# ---- ASR 引擎 ----
# faster-whisper（推荐，MIT，CPU INT8 已经够快）/ sherpa-onnx / vosk
engine = "faster-whisper"
# tiny | base | small | medium | large-v3 | distil-small.en | distil-large-v3
# tiny ~75MB（多语，安装包内置，开箱即用）；small ~466MB；distil-small.en 仅英文 ~166MB
# 在 Settings → Voice input 里点 "Download model" 可以预下载更大模型，避免首次按 Space 时卡顿
model_size = "tiny"
# ISO 639-1 ("en"/"zh"/"fr"…) 或 "auto" 让 Whisper 自检
language = "auto"
# int8 / int8_float16 / float16 / float32（CPU 用 int8 即可）
compute_type = "int8"
# cpu | cuda（cuda 需要用户自己装 CUDA 12 + cuDNN 9）
device = "cpu"
# 0 = 让 CTranslate2 自动用 os.cpu_count()
cpu_threads = 0
# Silero VAD 切静音段，避免 Whisper 在沉默处幻听
vad_filter = true
beam_size = 5
# 录音硬上限（秒）。前端到点强制停。
max_seconds = 30

# ---- 触发（a11y 优先：默认单键长按）----
# 任意单键或组合，默认单键 Space。设置页提供"录键"按钮捕获新键。
hotkey = "Space"
# 长按多少毫秒进入录音；0 = 经典 PTT（按下即录）。<1000 容易误触发，设置页会警告。
hold_threshold_ms = 3000
# release（松开即停）/ tap_again（再点一下停，残障友好默认）/ auto_silence（VAD 1.5s 自动停）
stop_mode = "tap_again"
# beep（听觉提示）/ vibrate-tray（托盘抖动，纯视觉）/ silent
start_feedback = "beep"
# 焦点感知：输入框聚焦时不抢 Space，让原生空格行为生效
focus_aware = true

# ---- 文本去向 ----
# auto（默认）          ：转录后过一个小 LLM 判定意图，路由到 thread_new /
#                       thread_abort / dictation_append。低置信度时悬浮窗
#                       弹出三选一让用户点。
# thread_new           ：跳过分流，每次都开新 thread 当任务执行。
# dictation_append     ：跳过分流，每次都拼到当前活跃 thread 的输入框 / 文本里。
mode = "auto"
# true = 转录完直接发送；false（默认）= 悬浮窗等用户点 ✓ 才发，先给用户检查 / 取消的机会
auto_send = false

# ---- 悬浮窗（屏顶居中）----
overlay_y_offset_px = 48

# ---- 杂项 ----
# 是否保留 ~/.lucid/voice/recording-*.webm 供调试
keep_audio = false
# HuggingFace 镜像。国内可填 https://hf-mirror.com 加速首次模型下载
hf_endpoint = ""
# 模型空闲多少秒后从内存释放，下次用再重新加载（冷启动 ~3s）
idle_unload_sec = 1800


[skills]
# Reusable parameterised playbooks. See Docs/skills.md.
enabled = true

# Allow downloading skill JSON from arbitrary http(s) URLs via
# `install_skill_url`. Default false because the downloaded steps still run
# through the agent loop with full user permissions. Toggle via /skills page.
allow_online_install = false

# Per-skill caps (defence against prompt-bombing / supply-chain abuse).
max_steps = 32
max_params = 16
max_bytes = 32768

# Inject the compact "## Available skills" block at the end of the system
# prompt. Disable to keep the prompt smaller (the agent can still use
# `list_skills` to enumerate them on demand).
inject_in_system_prompt = true
