# ctrlapp 运行时配置
#
# 这个文件是「示例 / 默认模板」，会被打进发行包；安装后真实的用户配置在
#   %LOCALAPPDATA%\dev.ctrlapp\config.toml
# 里改它，不要改这个文件（会在升级时被覆盖）。
#
# 三个 LLM 后端任选其一，靠 [llm].provider 切换。

[llm]
# provider: anthropic | copilot | proxy
#   anthropic — 直接调 Anthropic 原生 Messages API，需要 ANTHROPIC_API_KEY
#   copilot   — 走 GitHub Copilot OAuth（设置页里登录），免费额度充足
#   proxy     — 走任意 OpenAI 兼容代理（LiteLLM、OpenClaw、自建网关…）
provider = "copilot"

# 单次任务最多 ReAct 步数（硬上限，防失控）
max_steps = 50

# 模型最长输出 token（Claude Opus 4.x 上限 32768；agent 场景中庸 16384 平衡延迟与不被截断）
max_tokens = 16384

# 是否启用 prompt caching（系统 prompt 与早期截图）
enable_prompt_cache = true

# 对话历史里最多额外保留多少张截图（L1/L2/L3 各保留最近 1 张为默认主要保留策略）。
# 超出后旧图会被替换成占位文本（带本地文件名/路径），防止上游 413 Request Entity Too Large。
# 设 0 表示只靠每级保留 1 张的规则（实际 ≤3 张）；>0 时额外保留全局最近 N 张。
keep_recent_screenshots = 0

# === provider = "anthropic" 时使用 ===
[llm.anthropic]
model = "claude-opus-4-6"
# 留空则从 ANTHROPIC_API_KEY 环境变量读
api_key = ""
base_url = "https://api.anthropic.com"
anthropic_version = "2023-06-01"

# === provider = "copilot" 时使用 ===
[llm.copilot]
model = "claude-opus-4.6"
# 留空走默认路径 %LOCALAPPDATA%\dev.ctrlapp\copilot.json
state_file = ""

# === provider = "proxy" 时使用 ===
# 主 ReAct 循环 与 --smoke-test 都走这里。可选两个本地后端：
#   1) litellm-ghc-proxy-lite —— base_url=http://localhost:4000, model=github_copilot/...
#   2) OpenClaw gateway      —— base_url=http://127.0.0.1:18789, model="openclaw"
#      OpenClaw 把 model 字段当作 agent 选择，必须填 "openclaw"；
#      具体 backend 模型靠 HTTP header `x-openclaw-model` 选。
[llm.proxy]
base_url = "http://localhost:4000"
model = "github_copilot/claude-opus-4-6"
# 留空则从环境变量 LITELLM_MASTER_KEY 读取
api_key = ""

[logging]
# 是否把每次运行的主要信息与截图持久化到本地
enabled = true
# 日志根目录（相对路径会落到 %LOCALAPPDATA%\dev.ctrlapp\logs）
dir = "logs"
# 文本日志等级：DEBUG | INFO | WARNING | ERROR | OFF
text_level = "INFO"
# 截图保存等级：DEBUG | INFO | WARNING | OFF
image_level = "INFO"
# 截图存储格式：png | jpg
image_format = "png"
# JPG 质量（仅 image_format=jpg 时生效）
jpg_quality = 85
# 历史轮转：最多保留多少次运行的目录
keep_runs = 20

[screenshot]
# === 三级金字塔（design.md §4.5.3） ===
# 单位：秒；0 表示仅按事件触发，不做周期截图
l1_fullscreen_interval = 60.0
l2_activewindow_interval = 8.0
l3_cursor_interval = 0.0   # Phase 0 改为按事件触发

# L3 鼠标周边方块边长 = 2 * radius
l3_radius_px = 100

# 下采样长边；0 = 不缩放
l1_max_long_edge = 1568
l2_max_long_edge = 1568
l3_max_long_edge = 0

# 对话历史里每个 level 保留最近 K 张截图（装入发给 LLM 的 prompt 里）。
# 超出部分被替换为带路径的占位文本，需要时可反查。
keep_recent_l1 = 1
keep_recent_l2 = 1
keep_recent_l3 = 2

# 变化检测：相似度 > 阈值时跳过本次 LLM 调用（dHash 距离换算）
skip_if_similarity_above = 0.985

[safety]
# 危险动作触发 HITL 二次确认的关键字
hitl_keywords = ["删除", "delete", "rm ", "format", "shutdown", "转账", "支付", "确认付款"]
# 全局急停热键
emergency_hotkey = "ctrl+alt+esc"
# 默认自动度档位：full | confirm_critical | confirm_each
autonomy = "confirm_critical"
# 点击后额外抓一张 L3 落点取证图（架构层兜底）。
verify_click_with_l3 = true
# 保存/打开对话框中检测到"左侧导航树点击"时注入纠正提示（行为层兜底）。
save_dialog_sidebar_guard = true

[input]
# 输入策略：clipboard | unicode_sendinput
# - clipboard（推荐）：action="type" 走剪贴板粘贴，避开输入法状态干扰，中英文/路径都能直接传。
# - unicode_sendinput：走 pyautogui.typewrite，只支持 ASCII。
chinese_input = "clipboard"
# 每个动作之间的最小间隔（秒），给 UI 留响应时间
action_delay = 0.15

[icons]
# 图标记忆库：把"小图标 ↔ App"映射成 LOCALAPPDATA/dev.ctrlapp/icons/，
# 任务起手时拼成一张合集图注入 prompt，帮模型识别托盘/任务栏小图标。
enabled = true
max_icons = 60          # 超过则丢最早的
tile_size = 96          # 单图标在合集图里的最大渲染边长
atlas_cols = 4          # 合集图每行多少个图标
